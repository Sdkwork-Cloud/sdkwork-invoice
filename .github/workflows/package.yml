name: Package Application

on:
  push:
    tags: ["v*", "*.*.*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or source ref.
        required: true
        default: v0.1.0
      package_version:
        description: Artifact version.
        required: false
        default: ""
      deployment_profile:
        description: Deployment profile filter.
        required: true
        default: standalone
        type: choice
        options: [standalone]
      platform:
        description: Platform filter.
        required: true
        default: all
        type: choice
        options: [all, linux]
      architecture:
        description: Architecture filter.
        required: true
        default: all
        type: choice
        options: [all, x64]
      profile:
        description: Package profile filter.
        required: true
        default: all
        type: choice
        options: [all, server]
      format:
        description: Package format filter.
        required: true
        default: all
        type: choice
        options: [all, tar.gz]
      sdkwork_account_ref:
        description: sdkwork-account commit or ref.
        required: false
        default: main
      sdkwork_database_ref:
        description: sdkwork-database commit or ref.
        required: false
        default: main
      sdkwork_iam_ref:
        description: sdkwork-iam commit or ref.
        required: false
        default: main
      sdkwork_sdk_generator_ref:
        description: sdkwork-sdk-generator commit or ref.
        required: false
        default: main
      sdkwork_specs_ref:
        description: sdkwork-specs commit or ref.
        required: false
        default: main
      sdkwork_utils_ref:
        description: sdkwork-utils commit or ref.
        required: false
        default: main
      sdkwork_web_framework_ref:
        description: sdkwork-web-framework commit or ref.
        required: false
        default: main

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  package:
    uses: Sdkwork-Cloud/sdkwork-github-workflow/.github/workflows/sdkwork-package.yml@b0829529b9277a3da32b90c2d36ff34ff09fa832
    with:
      config_path: sdkwork.workflow.json
      tag: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
      package_version: ${{ github.event.inputs.package_version || '' }}
      deployment_profile: ${{ github.event.inputs.deployment_profile || 'standalone' }}
      platform: ${{ github.event.inputs.platform || 'all' }}
      architecture: ${{ github.event.inputs.architecture || 'all' }}
      profile: ${{ github.event.inputs.profile || 'all' }}
      format: ${{ github.event.inputs.format || 'all' }}
      publish_release: false
      upload_artifact: true
      retention_days: 30
      framework_ref: b0829529b9277a3da32b90c2d36ff34ff09fa832
      dependency_refs_json: >-
        {
          "SDKWORK_ACCOUNT_REF": "${{ github.event.inputs.sdkwork_account_ref || vars.SDKWORK_ACCOUNT_REF }}",
          "SDKWORK_DATABASE_REF": "${{ github.event.inputs.sdkwork_database_ref || vars.SDKWORK_DATABASE_REF }}",
          "SDKWORK_IAM_REF": "${{ github.event.inputs.sdkwork_iam_ref || vars.SDKWORK_IAM_REF }}",
          "SDKWORK_SDK_GENERATOR_REF": "${{ github.event.inputs.sdkwork_sdk_generator_ref || vars.SDKWORK_SDK_GENERATOR_REF }}",
          "SDKWORK_SPECS_REF": "${{ github.event.inputs.sdkwork_specs_ref || vars.SDKWORK_SPECS_REF }}",
          "SDKWORK_UTILS_REF": "${{ github.event.inputs.sdkwork_utils_ref || vars.SDKWORK_UTILS_REF }}",
          "SDKWORK_WEB_FRAMEWORK_REF": "${{ github.event.inputs.sdkwork_web_framework_ref || vars.SDKWORK_WEB_FRAMEWORK_REF }}"
        }
    secrets: inherit
